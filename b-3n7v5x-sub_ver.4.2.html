<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ざっくり家計簿ver.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .nav-btn.active { color: #ec4899; }
        .nav-btn.active svg { transform: translateY(-2px); color: #ec4899; }
        ::-webkit-scrollbar { width: 0px; }
        body { -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 font-sans text-slate-900">

    <!-- Firebase Email/Password ログイン画面 -->
    <div id="auth-screen" class="fixed inset-0 bg-slate-50 z-[100] flex items-center justify-center">
        <div class="max-w-xs w-full p-8 bg-white rounded-3xl shadow-xl space-y-5">
            <div class="w-16 h-16 bg-indigo-100 text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-2">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2-2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-center font-black text-slate-700">ログイン</h2>
            <div class="space-y-3">
                <input type="email" id="email-input" placeholder="メールアドレス" class="w-full p-3 bg-slate-100 rounded-xl outline-none text-sm focus:ring-2 focus:ring-indigo-300 transition-all">
                <input type="password" id="pw-input" placeholder="パスワード" class="w-full p-3 bg-slate-100 rounded-xl outline-none text-sm focus:ring-2 focus:ring-indigo-300 transition-all">
            </div>
            <button onclick="login()" id="login-btn" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold active:scale-95 transition-transform">ログイン</button>
            <p id="auth-error" class="text-xs text-red-500 hidden text-center font-bold">ログインに失敗しました</p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-30 border-b border-slate-100 p-4 text-center">
            <div class="max-w-md mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-100 rounded-full text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <span id="current-month-display" class="font-black text-slate-700 text-sm w-24">...</span>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-100 rounded-full text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
                <div class="flex items-center gap-2">
                    <div id="user-display" class="px-3 py-1 text-[10px] font-bold rounded-full">...</div>
                    <button onclick="logout()" class="text-slate-400 hover:text-slate-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-md mx-auto p-4 space-y-6">
            <!-- ホーム（記録） -->
            <div id="home-screen" class="tab-content active space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <form id="transaction-form" class="space-y-4">
                        <div class="flex p-1 bg-slate-100 rounded-xl">
                            <label class="flex-1 text-center cursor-pointer">
                                <input type="radio" name="type" value="expense" checked class="hidden peer" onchange="updateFormUI()">
                                <div class="peer-checked:bg-white peer-checked:text-pink-600 peer-checked:shadow-sm rounded-lg py-2 text-xs font-black text-slate-500 transition-all">支出</div>
                            </label>
                            <label class="flex-1 text-center cursor-pointer">
                                <input type="radio" name="type" value="income" class="hidden peer" onchange="updateFormUI()">
                                <div class="peer-checked:bg-white peer-checked:text-emerald-600 peer-checked:shadow-sm rounded-lg py-2 text-xs font-black text-slate-500 transition-all">歳入</div>
                            </label>
                            <label class="flex-1 text-center cursor-pointer">
                                <input type="radio" name="type" value="settle" class="hidden peer" onchange="updateFormUI()">
                                <div class="peer-checked:bg-white peer-checked:text-blue-600 peer-checked:shadow-sm rounded-lg py-2 text-xs font-black text-slate-500 transition-all">精算</div>
                            </label>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <input type="date" id="date" required class="bg-slate-50 p-3 rounded-xl text-sm outline-none">
                            <input type="number" id="amount" placeholder="金額" required class="bg-slate-50 p-3 rounded-xl text-sm font-bold outline-none" oninput="autoSplit()">
                        </div>
                        <input type="text" id="content" placeholder="内容" required class="w-full bg-slate-50 p-3 rounded-xl text-sm outline-none">
                        
                        <!-- 1軸カテゴリに変更 -->
                        <div id="cat-fields" class="w-full hidden">
                            <label class="text-[9px] text-slate-400 ml-1 font-bold mb-1 block">カテゴリ</label>
                            <select id="cat-main" class="w-full bg-slate-50 p-3 rounded-xl text-xs outline-none font-bold text-slate-600"></select>
                        </div>

                        <!-- 立替機能（支払者選択を追加） -->
                        <div id="reimbursement-section" class="bg-slate-50 p-4 rounded-2xl hidden border border-pink-100">
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="checkbox" id="is-reimbursement" onchange="toggleReimDetails()" class="w-4 h-4 text-pink-500">
                                <span class="text-xs font-bold text-slate-600">相手の分も含む（立替）</span>
                            </label>
                            
                            <div id="reimbursement-details" class="hidden mt-4 space-y-3">
                                <!-- 誰が支払ったかを選択するUIを追加 -->
                                <div>
                                    <label class="text-[9px] text-slate-400 block ml-1 mb-1 font-bold">実際の支払い者</label>
                                    <div class="flex gap-2">
                                        <label class="flex-1 text-center cursor-pointer">
                                            <input type="radio" name="paidBy" value="A" class="hidden peer">
                                            <div class="peer-checked:bg-indigo-500 peer-checked:text-white bg-slate-200 text-slate-500 rounded-lg py-2 text-xs font-bold transition-all">Aが支払った</div>
                                        </label>
                                        <label class="flex-1 text-center cursor-pointer">
                                            <input type="radio" name="paidBy" value="B" class="hidden peer">
                                            <div class="peer-checked:bg-pink-500 peer-checked:text-white bg-slate-200 text-slate-500 rounded-lg py-2 text-xs font-bold transition-all">Bが支払った</div>
                                        </label>
                                    </div>
                                </div>
                                
                                <div class="grid grid-cols-2 gap-2">
                                    <div><label class="text-[9px] text-slate-400 block ml-1 font-bold">A負担分</label><input type="number" id="amount-a" class="w-full p-2 rounded-lg text-xs border border-slate-200 font-bold" oninput="manualSplit('A')"></div>
                                    <div><label class="text-[9px] text-slate-400 block ml-1 font-bold">B負担分</label><input type="number" id="amount-b" class="w-full p-2 rounded-lg text-xs border border-slate-200 font-bold" oninput="manualSplit('B')"></div>
                                </div>
                            </div>
                        </div>

                        <button type="submit" id="save-btn" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-black shadow-lg active:scale-95 transition-transform">保存する</button>
                    </form>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <div id="record-list" class="divide-y divide-slate-50 text-center py-10 text-slate-400 text-xs">読み込み中...</div>
                </div>
            </div>

            <!-- 分析（新デザイン） -->
            <div id="stats-screen" class="tab-content space-y-6">
                <!-- ウォーターフォールチャート -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h3 class="font-black text-xs text-slate-400 text-center uppercase tracking-widest mb-4">収支内訳 (ウォーターフォール)</h3>
                    <div class="relative h-64">
                        <canvas id="waterfallChart"></canvas>
                    </div>
                </div>

                <!-- カレンダー表示（新機能） -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h3 class="font-black text-xs text-slate-400 text-center uppercase tracking-widest mb-4">日別支出カレンダー</h3>
                    <div id="calendar-grid"></div>
                </div>

                <!-- 月次推移 -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h3 class="font-black text-xs text-slate-400 mb-4 uppercase tracking-widest text-center">月次支出推移 (直近6ヶ月)</h3>
                    <div class="h-48">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 立替精算 -->
            <div id="settlement-screen" class="tab-content space-y-4">
                <div class="bg-slate-800 text-white p-8 rounded-3xl text-center shadow-xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10">
                        <svg class="w-20 h-20" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z"></path><path fill-rule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" clip-rule="evenodd"></path></svg>
                    </div>
                    <div id="settlement-large-display" class="text-4xl font-black">¥0</div>
                    <div id="settlement-direction-display" class="text-[10px] mt-2 text-slate-400 uppercase tracking-widest font-bold">CALCULATING...</div>
                </div>
                
                <h4 class="text-xs font-black text-slate-400 px-2 uppercase tracking-widest">共有・精算履歴</h4>
                <!-- スクロール可能にして上限を撤廃 -->
                <div id="reimbursement-list" class="space-y-3 max-h-[60vh] overflow-y-auto pb-4 pr-1"></div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-slate-100 p-3 z-40">
            <div class="max-w-md mx-auto flex justify-around">
                <button onclick="switchTab('home')" id="nav-home" class="nav-btn active flex flex-col items-center gap-1 text-slate-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    <span class="text-[10px] font-bold">記録</span>
                </button>
                <button onclick="switchTab('stats')" id="nav-stats" class="nav-btn flex flex-col items-center gap-1 text-slate-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    <span class="text-[10px] font-bold">分析</span>
                </button>
                <button onclick="switchTab('settlement')" id="nav-settlement" class="nav-btn flex flex-col items-center gap-1 text-slate-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    <span class="text-[10px] font-bold">精算</span>
                </button>
            </div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHXpyZApKA19bKbui4-pKNjVag7Y3A0ww",
            authDomain: "kakeibo-2944a.firebaseapp.com",
            projectId: "kakeibo-2944a",
            appId: "1:628237748010:web:23cbe6250a1a2f5ba04053"
        };
        const APP_ID = "kakeibo-production-v3";
        
        // 新しい1軸カテゴリシステム
        const CATEGORIES_NEW = {
            expense: ["生活", "仕事・交際", "自己投資", "娯楽・お出かけ・買い物", "旅行", "投資", "控除", "その他"],
            income: ["歳入", "その他"]
        };

        // 過去データの互換性マップ関数（選択肢A）
        function getMappedCategory(record) {
            if (record.type !== 'expense') return record.categoryMain || "歳入";
            // 既に新カテゴリ形式ならそのまま返す
            if (CATEGORIES_NEW.expense.includes(record.categoryMain)) return record.categoryMain;
            
            // 旧データを新カテゴリに振り分け
            const oldMain = record.categoryMain || "";
            const oldSub = record.categorySub || "";
            
            if (oldSub === "社会保険料" || oldSub === "税金" || oldSub === "控除") return "控除";
            if (oldMain === "仕事") return "仕事・交際";
            if (oldSub === "宿泊") return "旅行";
            if (oldMain === "趣味" || oldMain === "デート" || oldSub === "娯楽" || oldSub === "もの") return "娯楽・お出かけ・買い物";
            if (oldSub === "食費" || oldSub === "家賃" || oldSub === "移動" || oldSub === "健康") return "生活";
            
            return "その他"; // 当てはまらないものはその他
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allRecords = [];
        let chartInstances = {};
        let selectedMonth = new Date().toISOString().slice(0, 7);
        let currentUser = window.location.pathname.includes('b-3n7v5x-sub') ? 'B' : 'A';
        let partnerUser = currentUser === 'A' ? 'B' : 'A';
        let unsubscribeSnapshot = null;

        // ログイン処理
        window.login = async () => {
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.innerText = "認証中...";
            document.getElementById('auth-error').classList.add('hidden');
            
            try {
                const email = document.getElementById('email-input').value;
                const pw = document.getElementById('pw-input').value;
                await signInWithEmailAndPassword(auth, email, pw);
                // 成功すると onAuthStateChanged が発火する
            } catch (e) {
                console.error(e);
                document.getElementById('auth-error').classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "ログイン";
            }
        };

        // ログアウト処理
        window.logout = async () => {
            if(confirm('ログアウトしますか？')) {
                await signOut(auth);
            }
        };

        // 認証状態の監視
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // ログイン成功時
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                
                // ユーザー表示設定
                document.getElementById('user-display').innerText = `ユーザー${currentUser}`;
                document.getElementById('user-display').className = `px-3 py-1 text-[10px] font-bold text-white ${currentUser === 'A' ? 'bg-indigo-500' : 'bg-pink-500'}`;
                
                // データ取得開始
                if(unsubscribeSnapshot) unsubscribeSnapshot();
                const q = query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'transactions'));
                unsubscribeSnapshot = onSnapshot(q, (snap) => {
                    allRecords = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    render();
                }, (error) => {
                    console.error("データ取得エラー:", error);
                });
            } else {
                // 未ログイン時
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
                document.getElementById('email-input').value = '';
                document.getElementById('pw-input').value = '';
                document.getElementById('login-btn').disabled = false;
                document.getElementById('login-btn').innerText = "ログイン";
                if(unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
            }
        });

        // フォーム保存
        document.getElementById('transaction-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = "保存中...";
            const type = document.querySelector('input[name="type"]:checked').value;
            const amount = parseInt(document.getElementById('amount').value);
            const isReim = document.getElementById('is-reimbursement').checked;
            
            // 追加：支払い者情報
            const paidBy = (isReim && type !== 'settle') ? document.querySelector('input[name="paidBy"]:checked').value : currentUser;

            const data = {
                createdBy: currentUser,
                paidBy: paidBy, // 誰が立替えたか
                date: document.getElementById('date').value,
                type: type,
                amount: amount,
                content: document.getElementById('content').value,
                categoryMain: type === 'settle' ? '精算' : (type === 'income' ? '歳入' : document.getElementById('cat-main').value),
                categorySub: '', // もう使用しないが互換性のため空文字で保持
                isReimbursement: (type === 'expense' && isReim) || type === 'settle',
                amountA: type === 'settle' ? (currentUser === 'A' ? amount : 0) : (isReim ? parseInt(document.getElementById('amount-a').value) : (currentUser === 'A' ? amount : 0)),
                amountB: type === 'settle' ? (currentUser === 'B' ? amount : 0) : (isReim ? parseInt(document.getElementById('amount-b').value) : (currentUser === 'B' ? amount : 0)),
                createdAt: Timestamp.now()
            };

            try {
                await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'transactions'), data);
                document.getElementById('transaction-form').reset();
                document.getElementById('date').value = new Date().toISOString().slice(0, 10);
                updateFormUI();
            } catch (error) {
                console.error(error);
                alert("保存に失敗しました。アクセス権限がない可能性があります。");
            } finally {
                btn.disabled = false;
                btn.innerText = "保存する";
            }
        };

        window.deleteRecord = async (id) => { 
            if(confirm('削除しますか？')) await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'transactions', id)); 
        };

        window.updateFormUI = () => {
            const type = document.querySelector('input[name="type"]:checked').value;
            const catFields = document.getElementById('cat-fields');
            const reimSection = document.getElementById('reimbursement-section');
            const catMainSelect = document.getElementById('cat-main');

            if (type === 'settle') {
                catFields.classList.add('hidden');
                reimSection.classList.add('hidden');
                document.getElementById('is-reimbursement').checked = true;
            } else if (type === 'income') {
                catFields.classList.remove('hidden');
                reimSection.classList.add('hidden');
                document.getElementById('is-reimbursement').checked = false;
                catMainSelect.innerHTML = CATEGORIES_NEW.income.map(c => `<option value="${c}">${c}</option>`).join('');
            } else {
                catFields.classList.remove('hidden');
                reimSection.classList.remove('hidden');
                catMainSelect.innerHTML = CATEGORIES_NEW.expense.map(c => `<option value="${c}">${c}</option>`).join('');
            }
            toggleReimDetails();
        };

        window.toggleReimDetails = () => {
            const isChecked = document.getElementById('is-reimbursement').checked;
            const type = document.querySelector('input[name="type"]:checked').value;
            document.getElementById('reimbursement-details').classList.toggle('hidden', !isChecked || type === 'settle');
            if(isChecked) {
                // デフォルトの支払者を選択中のユーザーにする
                document.querySelector(`input[name="paidBy"][value="${currentUser}"]`).checked = true;
                autoSplit();
            }
        };

        window.autoSplit = () => {
            const total = parseInt(document.getElementById('amount').value) || 0;
            document.getElementById('amount-a').value = Math.floor(total / 2);
            document.getElementById('amount-b').value = total - Math.floor(total / 2);
        };

        window.manualSplit = (target) => {
            const total = parseInt(document.getElementById('amount').value) || 0;
            const val = parseInt(document.getElementById(target === 'A' ? 'amount-a' : 'amount-b').value) || 0;
            document.getElementById(target === 'A' ? 'amount-b' : 'amount-a').value = total - val;
        };

        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active', 'text-pink-500'));
            document.getElementById(`${tabId}-screen`).classList.add('active');
            document.getElementById(`nav-${tabId}`).classList.add('active', 'text-pink-500');
            render();
        };

        window.changeMonth = (val) => {
            const d = new Date(selectedMonth + "-01");
            d.setMonth(d.getMonth() + val);
            selectedMonth = d.toISOString().slice(0, 7);
            document.getElementById('current-month-display').innerText = selectedMonth.replace('-', '年 ') + '月';
            render();
        };

        function render() {
            const monthRecords = allRecords.filter(r => r.date.startsWith(selectedMonth));
            const visibleRecords = monthRecords.filter(r => r.isReimbursement || r.createdBy === currentUser);
            visibleRecords.sort((a,b) => b.date.localeCompare(a.date) || b.createdAt - a.createdAt);

            // ホーム画面：リスト描画
            const listEl = document.getElementById('record-list');
            if(visibleRecords.length === 0) listEl.innerHTML = `<div class="py-10 text-slate-400 text-xs text-center">今月の記録はありません</div>`;
            else {
                listEl.innerHTML = visibleRecords.map(r => {
                    const mappedCat = getMappedCategory(r);
                    return `
                    <div class="p-4 flex justify-between items-center bg-white border-b border-slate-50">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[8px] px-1.5 py-0.5 rounded-md font-bold text-white ${r.createdBy === 'A' ? 'bg-indigo-400' : 'bg-pink-400'}">${r.createdBy}入力</span>
                                <span class="text-[9px] text-slate-400 font-bold">${r.date}</span>
                            </div>
                            <div class="text-xs font-bold text-slate-700">${r.content}</div>
                            <div class="text-[9px] text-slate-400 font-bold mt-1 text-pink-500">${mappedCat}</div>
                        </div>
                        <div class="text-right flex items-center gap-4">
                            <div class="text-sm font-black ${r.type==='income'?'text-emerald-500':(r.type==='settle'?'text-blue-500':'text-slate-800')}">
                                ¥${(currentUser==='A'?r.amountA:r.amountB).toLocaleString()}
                            </div>
                            <button onclick="deleteRecord('${r.id}')" class="text-slate-200 hover:text-red-400 text-lg">×</button>
                        </div>
                    </div>
                `}).join('');
            }

            // 精算額計算ロジック（改修箇所）
            let netA = 0;
            allRecords.forEach(r => {
                if (r.type === 'settle') { 
                    if (r.createdBy === 'A') netA += r.amount; else netA -= r.amount; 
                } else if (r.isReimbursement) {
                    // paidByが存在しない古いデータはcreatedByを支払者とみなす
                    const actualPayer = r.paidBy || r.createdBy;
                    if (actualPayer === 'A') {
                        // Aが支払った -> Aの財布から出たが、B負担分がある -> AはB負担分を受け取る権利がある(プラス)
                        netA += r.amountB;
                    } else {
                        // Bが支払った -> Bの財布から出たが、A負担分がある -> AはA負担分をBに支払う義務がある(マイナス)
                        netA -= r.amountA;
                    }
                }
            });

            const displayBal = currentUser === 'A' ? netA : -netA;
            document.getElementById('settlement-large-display').innerText = `¥${Math.abs(displayBal).toLocaleString()}`;
            document.getElementById('settlement-direction-display').innerText = displayBal > 0 ? `${partnerUser} から受取予定` : (displayBal < 0 ? `${partnerUser} へ支払予定` : '精算済み');

            // 履歴リスト描画（上限撤廃）
            document.getElementById('reimbursement-list').innerHTML = allRecords
                .filter(r => r.isReimbursement || r.type === 'settle')
                .sort((a,b)=>b.date.localeCompare(a.date)) // .slice()を削除し全件表示
                .map(r => {
                    const actualPayer = r.paidBy || r.createdBy;
                    return `
                    <div class="p-4 bg-white rounded-2xl border border-slate-100 flex flex-col shadow-sm">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="text-[8px] font-black ${r.type==='settle'?'text-blue-500':'text-slate-400'} uppercase mb-1">
                                    ${r.date} ${r.type==='settle'?'[精算送金]':`支払: ${actualPayer}`}
                                </div>
                                <div class="text-[11px] font-bold text-slate-800">${r.content}</div>
                            </div>
                            <div class="text-xs font-black text-slate-700">¥${r.amount.toLocaleString()}</div>
                        </div>
                        ${r.type!=='settle' ? `
                            <div class="mt-2 pt-2 border-t border-slate-50 flex justify-between">
                                <span class="text-[9px] text-slate-400 font-bold">A負担: ¥${r.amountA.toLocaleString()}</span>
                                <span class="text-[9px] text-slate-400 font-bold">B負担: ¥${r.amountB.toLocaleString()}</span>
                            </div>
                        `: ''}
                    </div>
                `}).join('');

            updateStats(monthRecords);
        }

        // 分析タブ描画
        function updateStats(monthData) {
            const myRecords = monthData.filter(r => r.createdBy === currentUser || r.isReimbursement);
            
            const mainTotals = {};
            let totalIn = 0;

            myRecords.forEach(r => {
                const myAmount = currentUser === 'A' ? r.amountA : r.amountB;
                const mappedCat = getMappedCategory(r);

                if (r.type === 'income') {
                    totalIn += myAmount;
                } else if (r.type === 'expense') {
                    mainTotals[mappedCat] = (mainTotals[mappedCat] || 0) + myAmount;
                }
            });

            // 1. ウォーターフォールチャート（フローティングバーチャートで疑似実装）
            // 並び順をカスタム: 歳入 -> その他支出 -> 控除 -> 投資 -> 残額
            const otherExpenses = CATEGORIES_NEW.expense.filter(c => c !== '控除' && c !== '投資');
            const labels = ['歳入', ...otherExpenses, '控除', '投資', '残額'];
            const dataPairs = [];
            const bgColors = [];
            let currentBalance = 0;

            // 歳入バー
            dataPairs.push([0, totalIn]);
            bgColors.push('#10b981'); // Emerald
            currentBalance = totalIn;

            // 支出各バーの描画ループ
            labels.slice(1, -1).forEach(cat => {
                const exp = mainTotals[cat] || 0;
                dataPairs.push([currentBalance - exp, currentBalance]);
                
                // 色の条件分岐
                if (cat === '控除') {
                    bgColors.push('#f59e0b'); // Amber (控除用のオレンジ系)
                } else if (cat === '投資') {
                    bgColors.push('#6366f1'); // Indigo (投資用の青紫系)
                } else {
                    bgColors.push('#f43f5e'); // Rose (通常の支出用赤系)
                }
                
                currentBalance -= exp;
            });

            // 残額バー
            dataPairs.push([0, currentBalance]);
            bgColors.push(currentBalance >= 0 ? '#3b82f6' : '#ef4444'); // 青(黒字) / 赤(赤字)

            if(chartInstances.waterfall) chartInstances.waterfall.destroy();
            chartInstances.waterfall = new Chart(document.getElementById('waterfallChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataPairs,
                        backgroundColor: bgColors,
                        borderWidth: 0,
                        borderRadius: 4
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const val = Math.abs(context.raw[1] - context.raw[0]);
                                    return `¥${val.toLocaleString()}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { ticks: { font: { size: 9 }, maxRotation: 45, minRotation: 45 }, grid: { display: false } },
                        y: { grid: { color: '#f1f5f9' } }
                    }
                }
            });

            // 2. カレンダー描画
            renderCalendar(monthData);

            // 3. 月次推移チャート
            const monthLabels = [];
            const monthExpenses = [];
            const baseDate = new Date(selectedMonth + "-01");
            for (let i = 5; i >= 0; i--) {
                const d = new Date(baseDate);
                d.setMonth(d.getMonth() - i);
                const m = d.toISOString().slice(0, 7);
                monthLabels.push(m.split('-')[1] + '月');
                const sum = allRecords.filter(r => r.date.startsWith(m) && r.type === 'expense' && (r.createdBy === currentUser || r.isReimbursement))
                                      .reduce((s, r) => s + (currentUser === 'A' ? r.amountA : r.amountB), 0);
                monthExpenses.push(sum);
            }

            if(chartInstances.monthly) chartInstances.monthly.destroy();
            chartInstances.monthly = new Chart(document.getElementById('monthlyChart'), {
                type: 'line',
                data: {
                    labels: monthLabels,
                    datasets: [{
                        label: '総支出',
                        data: monthExpenses,
                        borderColor: '#f43f5e',
                        backgroundColor: 'rgba(244, 63, 94, 0.1)',
                        borderWidth: 3,
                        pointRadius: 4,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } }
                }
            });
        }

        // カレンダー生成関数
        function renderCalendar(monthData) {
            const calEl = document.getElementById('calendar-grid');
            const d = new Date(selectedMonth + "-01");
            const year = d.getFullYear();
            const month = d.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // 日別の支出を集計
            const dailyExps = {};
            monthData.forEach(r => {
                if(r.type === 'expense' && (r.createdBy === currentUser || r.isReimbursement)) {
                    const day = parseInt(r.date.split('-')[2], 10);
                    const myAmount = currentUser === 'A' ? r.amountA : r.amountB;
                    dailyExps[day] = (dailyExps[day] || 0) + myAmount;
                }
            });
            
            let html = `
                <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-slate-400 mb-2">
                    <div class="text-red-400">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-blue-400">土</div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center">
            `;
            
            // 空白セル
            for(let i=0; i<firstDay; i++) {
                html += `<div class="bg-slate-50 rounded-lg"></div>`;
            }
            
            // 日付セル
            for(let i=1; i<=daysInMonth; i++) {
                const exp = dailyExps[i] || 0;
                const today = new Date().toISOString().slice(0,10) === `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                
                const expHtml = exp > 0 ? `<div class="text-[8.5px] text-pink-500 font-black mt-1">¥${exp.toLocaleString()}</div>` : '';
                const todayClass = today ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-100';
                
                html += `
                    <div class="py-1 min-h-[44px] border rounded-lg ${todayClass} flex flex-col items-center justify-start shadow-sm">
                        <div class="text-[10px] text-slate-600 font-bold">${i}</div>
                        ${expHtml}
                    </div>
                `;
            }
            html += `</div>`;
            calEl.innerHTML = html;
        }

        window.onload = () => {
            document.getElementById('date').value = new Date().toISOString().slice(0, 10);
            document.getElementById('current-month-display').innerText = selectedMonth.replace('-', '年 ') + '月';
            updateFormUI();
        };
    </script>
</body>
</html>
